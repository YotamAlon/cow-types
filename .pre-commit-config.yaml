repos:
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 25.1.0
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/pylint
    rev: v3.3.7
    hooks:
      - id: pylint

  - repo: local
    hooks:
      - id: gen-compile-commands
        name: Generate compile_commands.json
        entry: make compile-commands
        language: system
        pass_filenames: false
        types: [c]

  - repo: https://github.com/cpp-linter/cpp-linter-hooks
    rev: v1.4.0
    hooks:
      - id: clang-format
      - id: clang-tidy
        args: [-p, .]
