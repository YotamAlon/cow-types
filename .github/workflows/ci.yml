name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.load.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      - id: load
        run: |
          versions=$(python3 -c "import tomllib, json; data = tomllib.load(open('pyproject.toml', 'rb')); print(json.dumps(data['tool']['ci']['python-versions']))")
          echo "versions=$versions" >> $GITHUB_OUTPUT

  test:
    needs: get-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.get-versions.outputs.versions) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - run: pip install -e ".[dev]"

      - run: pytest tests/ -v
